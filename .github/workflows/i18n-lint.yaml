name: i18n — Lint

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
    secrets:
      NPM_TOKEN:
        description: 'npm token used for private @cellarnode/* package installs (.npmrc env-var substitution)'
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Forward NPM_TOKEN so the .npmrc env-var substitution finds it during
    # pnpm install. Caller side declares the secret via `secrets: inherit`
    # (or an explicit `secrets: NPM_TOKEN: ${{ secrets.NPM_TOKEN }}` map).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install i18next-cli
        run: npm install -g i18next-cli

      - name: Lint i18n
        run: npx i18next-cli lint
