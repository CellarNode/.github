name: Deploy Static Website

on:
  workflow_call:
    inputs:
      website:
        description: "Production hostname (e.g. admin.cellarnode.com)"
        required: true
        type: string
      website_slug:
        description: "Slug for preview URLs (e.g. admin-cellarnode-com)"
        required: true
        type: string
      build_env:
        description: "Build-time env vars as KEY=VALUE lines"
        required: false
        type: string
        default: ""
      typecheck:
        description: "Run pnpm tsc --noEmit before build"
        required: false
        type: boolean
        default: false
      lint:
        description: "Run pnpm lint before build"
        required: false
        type: boolean
        default: false
      frozen_lockfile:
        description: "Use --frozen-lockfile for pnpm install"
        required: false
        type: boolean
        default: true
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "22"
      discord_tags:
        description: "Comma-separated Discord forum tag names (e.g. admin,importer)"
        required: false
        type: string
        default: ""
    secrets:
      NPM_TOKEN:
        description: "npm token used for private @cellarnode/* package installs (.npmrc env-var substitution)"
        required: false

env:
  PROJECT_ID: festive-terrain-478011-h0
  GCS_BUCKET: websites-deploy

jobs:
  build-deploy:
    if: github.event.action != 'closed'
    # Self-hosted: site builds were the org's remaining paid-GHA-minutes bulk.
    # Prebaked ci-runner image = no per-job node/pnpm/gcloud downloads; npm
    # rides the in-region AR mirror. All repos are private, and fork PRs are
    # already build-only via the should_deploy flag.
    runs-on: self-hosted-k8s
    container:
      image: europe-north1-docker.pkg.dev/festive-terrain-478011-h0/beveriq/ci-runner:latest
    outputs:
      deployed: ${{ steps.flags.outputs.should_deploy }}
    # Forward NPM_TOKEN so .npmrc env-var substitution finds it during
    # pnpm install. Caller side declares the secret via `secrets: inherit`
    # (or an explicit `secrets: NPM_TOKEN: ${{ secrets.NPM_TOKEN }}` map).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    # Fork PRs can't authenticate via the repo-bound WIF provider — build
    # only, skip auth/deploy instead of failing red.
    - name: Set deploy flags
      id: flags
      env:
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        BASE_REPO: ${{ github.repository }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          if [ "$HEAD_REPO" = "$BASE_REPO" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
        fi

    # node22 + pnpm (corepack) come prebaked in the ci-runner image; the
    # node_version input is no longer consulted (all sites are on 22).

    - name: Install dependencies
      run: pnpm install ${{ inputs.frozen_lockfile && '--frozen-lockfile' || '--no-frozen-lockfile' }}

    - name: Type check
      if: inputs.typecheck
      run: pnpm tsc --noEmit

    - name: Lint
      if: inputs.lint
      run: pnpm lint

    - name: Build
      shell: bash
      run: |
        if [ -n "$BUILD_ENV_VARS" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] && export "$line"
          done <<< "$BUILD_ENV_VARS"
        fi
        pnpm build
      env:
        BUILD_ENV_VARS: ${{ inputs.build_env }}

    - name: Authenticate to Google Cloud
      if: steps.flags.outputs.should_deploy == 'true'
      id: auth
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ env.PROJECT_ID }}
        workload_identity_provider: 'projects/1040576468442/locations/global/workloadIdentityPools/iamwipp-pipelines/providers/iamwipp-github-pipelines-beveriq'
        service_account: 'pipelines@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      if: steps.flags.outputs.should_deploy == 'true'
      uses: google-github-actions/setup-gcloud@v2
      with:
        skip_install: true # gcloud prebaked in ci-runner image

    # Warm gcloud's SQLite credential/token caches with a single serial call
    # before the parallel rsync. On ephemeral runners ~/.config/gcloud is
    # fresh every run, so the first gcloud invocation performs a schema
    # migration (ALTER TABLE ... ADD COLUMN id_token / regional_access_
    # boundary*). `gcloud storage rsync` fans out into worker processes that
    # otherwise race that migration and the token cache writes, failing
    # upload tasks with "duplicate column name: ..." / "database is locked"
    # and leaving the site partially deployed (2026-07-09, admin dashboard).
    - name: Warm gcloud credential cache
      if: steps.flags.outputs.should_deploy == 'true'
      run: gcloud storage ls "gs://${GCS_BUCKET}" > /dev/null

    - name: Deploy to production
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        WEBSITE: ${{ inputs.website }}
      run: |
        gcloud storage rsync --recursive --checksums-only --delete-unmatched-destination-objects \
          ./dist "gs://${GCS_BUCKET}/${WEBSITE}"

    - name: Deploy preview
      if: steps.flags.outputs.should_deploy == 'true' && github.event_name == 'pull_request'
      env:
        WEBSITE_SLUG: ${{ inputs.website_slug }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        gcloud storage rsync --recursive --checksums-only --delete-unmatched-destination-objects \
          ./dist "gs://${GCS_BUCKET}/preview/${WEBSITE_SLUG}/pr${PR_NUMBER}"

    - name: Comment preview URL
      if: steps.flags.outputs.should_deploy == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const slug = '${{ inputs.website_slug }}';
          const pr = context.payload.pull_request;
          const previewUrl = `https://${slug}-pr${pr.number}.dev.cellarnode.com`;
          const body = `## Preview Deployment\n\nPreview available at: ${previewUrl}`;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
          });

          const botComment = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Preview Deployment')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body
            });
          }

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: self-hosted-k8s
    container:
      image: europe-north1-docker.pkg.dev/festive-terrain-478011-h0/beveriq/ci-runner:latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ env.PROJECT_ID }}
        workload_identity_provider: 'projects/1040576468442/locations/global/workloadIdentityPools/iamwipp-pipelines/providers/iamwipp-github-pipelines-beveriq'
        service_account: 'pipelines@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        skip_install: true # gcloud prebaked in ci-runner image

    - name: Delete preview
      run: |
        gcloud storage rm --recursive gs://${{ env.GCS_BUCKET }}/preview/${{ inputs.website_slug }}/pr${{ github.event.pull_request.number }} || true

  # --- Discord thread lifecycle ---

  discord-thread-open:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_open
      tags: ${{ inputs.discord_tags }}

  discord-build-update:
    needs: [build-deploy, discord-thread-open]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.build-deploy.result != 'cancelled'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_update
      status: ${{ needs.build-deploy.result }}
      # Fork PRs skip the preview deploy — don't post a dead link
      preview_url: ${{ needs.build-deploy.outputs.deployed == 'true' && format('https://{0}-pr{1}.dev.cellarnode.com', inputs.website_slug, github.event.pull_request.number) || '' }}

  discord-thread-close:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_close
      status: ${{ github.event.pull_request.merged && 'merged' || 'closed' }}

  discord-deploy:
    needs: build-deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: deploy
      status: ${{ needs.build-deploy.result }}
      tags: ${{ inputs.discord_tags }}
