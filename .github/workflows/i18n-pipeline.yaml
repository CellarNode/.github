name: i18n — Sync + Translate

on:
  workflow_call:
    inputs:
      force-translate:
        description: 'Force retranslate all keys'
        required: false
        type: boolean
        default: false
      context:
        description: 'Domain context for Gemini translation'
        required: false
        type: string
        default: 'Beverage industry B2B platform'
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      locales_path:
        description: 'Path to locales directory'
        required: false
        type: string
        default: 'public/locales'
      target_languages:
        description: 'Comma-separated target language codes'
        required: false
        type: string
        default: 'zh,fr,de,it,es,sv,ru'
    secrets:
      GOOGLE_API_KEY:
        required: true
      NPM_TOKEN:
        description: 'npm token used for private @cellarnode/* package installs (.npmrc env-var substitution)'
        # CEL-384 Prong 1a: flipped to required:true after CEL-361/382/383
        # confirmed all current callers (producer, importer, public-site) use
        # `secrets: inherit`, which auto-forwards NPM_TOKEN from org-level
        # secrets regardless of whether the consumer needs it at runtime.
        # GitHub Actions' native launch-time validation gives a clearer
        # named-secret error than the in-job pre-flight below, which now acts
        # as defense-in-depth for the "secret declared but empty" case.
        required: true

jobs:
  sync-translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Forward NPM_TOKEN so .npmrc env-var substitution finds it during
    # pnpm install. Caller side declares the secret via `secrets: inherit`
    # (or an explicit `secrets: NPM_TOKEN: ${{ secrets.NPM_TOKEN }}` map).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      # CEL-384 prong 1b: catch the most-common failure mode — caller did not
      # forward NPM_TOKEN but the repo has private @cellarnode/* deps — and
      # fail fast with a named-secret error instead of the npm-404 misdirection
      # that ate ~20 days of importer (CEL-382) and ~7 days of producer (CEL-361).
      # Public-only consumers (e.g., cellarnode-public-site, which uses only
      # @cellarnode/i18n / @cellarnode/auth / @cellarnode/beverage-utils) skip
      # this gate because their deps install from public npm without auth.
      - name: Verify NPM_TOKEN forwarding for private deps
        run: |
          set -eu
          PRIVATE_REFS=$(find . -name package.json -not -path '*/node_modules/*' \
            -exec grep -l '"@cellarnode/\(ui\|finance\)"' {} + 2>/dev/null || true)
          if [ -n "$PRIVATE_REFS" ]; then
            if [ -z "${NPM_TOKEN:-}" ]; then
              echo "::error title=NPM_TOKEN missing::Private @cellarnode/* dep detected but NPM_TOKEN is empty."
              echo "::error::Found in:"
              echo "$PRIVATE_REFS" | sed 's/^/::error::  /'
              echo "::error::Caller workflow must forward NPM_TOKEN via 'secrets: inherit' (recommended) or an explicit secrets map."
              echo "::error::See CEL-361 / CEL-382 / CEL-383 for the recurring failure mode this prevents."
              exit 1
            fi
            echo "Private @cellarnode/* deps detected in:"
            echo "$PRIVATE_REFS" | sed 's/^/  /'
            echo "NPM_TOKEN forwarding verified."
          else
            echo "No private @cellarnode/* deps detected; NPM_TOKEN not required for this build."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install i18n tools
        run: npm install -g i18next-cli polyglot-i18n

      - name: Sync locale files
        run: npx i18next-cli sync

      - name: Translate new/changed keys
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force-translate }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          polyglot-i18n translate \
            --input "./${{ inputs.locales_path }}/en" \
            --output-languages "${{ inputs.target_languages }}" \
            --provider gemini \
            --api-key "$GOOGLE_API_KEY" \
            --context "${{ inputs.context }}" \
            $FORCE_FLAG

      - name: Generate TypeScript types
        run: npx i18next-cli types || true

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/i18n-pipeline-$(date +%Y%m%d-%H%M)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "${{ inputs.locales_path }}/" .polyglot-cache.json src/ || true
          git commit -m "chore(i18n): sync + translate"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(i18n): sync + translate" \
            --body "Automated i18n pipeline: synced locale files, translated via Gemini, regenerated types." \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH"

  # CEL-384 prong 2: alert on workflow failure so the next silent-failure
  # incident becomes a 15-minute discovery instead of 7-20 days (CEL-361 /
  # CEL-382). Routes through the existing discord-notify reusable so it
  # lands in the same Discord forum the team already monitors.
  #
  # `workflow_name` is passed explicitly because `context.workflow` inside the
  # nested reusable resolves to "Discord Notification" (the reusable's own
  # name), not the failing pipeline's name. Caught by CEL-384 reviewers A + B.
  #
  # No `secrets: inherit` — discord-notify reads only `vars.DISCORD_WEBHOOK_URL`
  # (a variable, not a secret) and uses the default `github.token` for API
  # calls in non-`ci_failure` events. Minimum-privilege per CodeRabbit.
  alert-on-failure:
    needs: sync-translate
    if: ${{ failure() }}
    uses: ./.github/workflows/discord-notify.yaml
    with:
      event: ci_failure
      status: failure
      tags: infra
      workflow_name: ${{ github.workflow }}
