name: Discord Notification

on:
  workflow_call:
    inputs:
      event:
        description: "Event type: pr_created or deploy"
        required: true
        type: string
      status:
        description: "Job status (success, failure, cancelled)"
        required: false
        type: string
        default: "success"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        uses: actions/github-script@v7
        env:
          WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          EVENT: ${{ inputs.event }}
          STATUS: ${{ inputs.status }}
        with:
          script: |
            const webhook = process.env.WEBHOOK_URL;
            const event = process.env.EVENT;
            const status = process.env.STATUS;
            const repo = context.repo.repo;
            const actor = context.actor;
            const sha = context.sha.substring(0, 7);
            const ref = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${repo}/actions/runs/${context.runId}`;

            let payload;

            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${repo}`;

            if (event === 'pr_created') {
              const pr = context.payload.pull_request;
              payload = {
                content: `🔍 **Review required** — ${repo}`,
                embeds: [{
                  title: `#${pr.number} ${pr.title}`,
                  url: pr.html_url,
                  description: `**${actor}** opened a pull request\n\n${pr.body ? pr.body.substring(0, 200) : ''}`,
                  color: 5814783,
                  footer: { text: repo },
                  timestamp: new Date().toISOString()
                }],
                components: [{
                  type: 1,
                  components: [
                    { type: 2, style: 5, label: "View PR", url: pr.html_url },
                    { type: 2, style: 5, label: "Files Changed", url: `${pr.html_url}/files` }
                  ]
                }]
              };
            } else {
              const color = status === 'success' ? 3066993 : status === 'failure' ? 15158332 : 10070709;
              const emoji = status === 'success' ? '✅' : status === 'failure' ? '❌' : '⚠️';

              // Get commit message
              let commitMsg = '';
              try {
                const { data: commit } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.sha
                });
                commitMsg = commit.commit.message.split('\n')[0];
              } catch (e) {
                commitMsg = '';
              }

              const compareUrl = `${repoUrl}/compare/${context.payload.before?.substring(0, 7)}...${sha}`;

              payload = {
                flags: 4096,
                embeds: [{
                  title: `${emoji} ${repo} deployed`,
                  url: runUrl,
                  description: `\`${sha}\` ${commitMsg}\n\nby ${actor}`,
                  color: color,
                  footer: { text: `${repo} • ${ref}` },
                  timestamp: new Date().toISOString()
                }],
                components: [{
                  type: 1,
                  components: [
                    { type: 2, style: 5, label: "View Run", url: runUrl },
                    { type: 2, style: 5, label: "Compare Changes", url: compareUrl }
                  ]
                }]
              };
            }

            const res = await fetch(webhook, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              const text = await res.text();
              core.setFailed(`Discord webhook failed: ${res.status} ${text}`);
            }
