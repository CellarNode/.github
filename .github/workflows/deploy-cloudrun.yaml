name: Build and Deploy Cloud Run

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name (used for image name and ArgoCD app)"
        required: true
        type: string
      deploy_path:
        description: "ArgoCD kustomize path prefix in crossplane-gcloud repo"
        required: false
        type: string
        default: "./deploy/installations"
      argocd_project:
        description: "ArgoCD project name"
        required: false
        type: string
        default: "products"
      discord_tags:
        description: "Comma-separated Discord forum tag names (e.g. backend,infra)"
        required: false
        type: string
        default: ""

env:
  CONTAINER_REGISTRY: europe-north1-docker.pkg.dev
  PROJECT_ID: festive-terrain-478011-h0
  CONTAINER_REPOSITORY: beveriq

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image_tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              echo "should_push=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_push=false" >> "$GITHUB_OUTPUT"
            fi
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "should_push=true" >> "$GITHUB_OUTPUT"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "push_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "push_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        if: steps.vars.outputs.should_push == 'true'
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: "projects/1040576468442/locations/global/workloadIdentityPools/iamwipp-pipelines/providers/iamwipp-github-pipelines-beveriq"
          service_account: "pipelines@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Login to Artifact Registry
        if: steps.vars.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        if: steps.vars.outputs.should_push == 'true'
        shell: bash
        run: |
          APP='${{ inputs.app_name }}'
          TAG='${{ steps.vars.outputs.image_tag }}'
          REGISTRY="${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CONTAINER_REPOSITORY }}"
          CACHE_REF="${REGISTRY}/${APP}-cache:latest"

          TAGS="--tag ${REGISTRY}/${APP}:${TAG}"
          if [ "${{ steps.vars.outputs.push_latest }}" = "true" ]; then
            TAGS="${TAGS} --tag ${REGISTRY}/${APP}:latest"
          fi

          docker buildx build \
            --push \
            ${TAGS} \
            --cache-from="type=registry,ref=${CACHE_REF}" \
            --cache-to="type=registry,ref=${CACHE_REF},mode=max" \
            .

      - name: Build image (no push)
        if: steps.vars.outputs.should_push != 'true'
        run: docker buildx build .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Setup ArgoCD CLI
        uses: imajeetyadav/argocd-cli@v1
        with:
          version: v3.2.1

      - name: Deploy to ArgoCD
        env:
          ARGOCD_AUTH_TOKEN: ${{ vars.ARGO_API_KEY }}
          ARGOCD_URL: argo.anli.es
        run: |
          APP='${{ inputs.app_name }}'
          REGISTRY="${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CONTAINER_REPOSITORY }}"
          TAG="${{ needs.build.outputs.image_tag }}"

          argocd app create --upsert ${APP}-cloudrun --server $ARGOCD_URL \
            --project ${{ inputs.argocd_project }} \
            --repo git@github.com:CellarNode/crossplane-gcloud.git \
            --path ${{ inputs.deploy_path }}/${APP}/ \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${APP}-cloudrun \
            --kustomize-image "app-image=${REGISTRY}/${APP}:${TAG}" \
            --sync-policy auto \
            --sync-option PruneLast=true

  # --- Discord thread lifecycle ---

  discord-thread-open:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_open
      tags: ${{ inputs.discord_tags }}

  discord-build-update:
    needs: [build, discord-thread-open]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.build.result != 'cancelled'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_update
      status: ${{ needs.build.result }}

  discord-thread-close:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_close
      status: ${{ github.event.pull_request.merged && 'merged' || 'closed' }}

  discord-deploy:
    needs: deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: deploy
      status: ${{ needs.deploy.result }}
      tags: ${{ inputs.discord_tags }}
