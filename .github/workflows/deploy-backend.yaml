name: Build and Deploy Backend

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name (used for image names and ArgoCD app prefix)"
        required: true
        type: string
      docker_targets:
        description: "JSON array of Docker build targets, e.g. [\"unified\", \"worker\"]"
        required: true
        type: string
      flavors:
        description: "JSON array of deploy flavors, e.g. [\"admin\", \"public\", \"worker-extraction\"]"
        required: true
        type: string
      deploy_path:
        description: "ArgoCD kustomize path prefix in crossplane-gcloud repo"
        required: false
        type: string
        default: "./deploy/installations"
      argocd_project:
        description: "ArgoCD project name"
        required: false
        type: string
        default: "products"
      worker_image_prefix:
        description: "Flavor prefix that maps to the worker Docker target (e.g. 'worker' matches worker-*)"
        required: false
        type: string
        default: "worker"
      discord_tags:
        description: "Comma-separated Discord forum tag names (e.g. backend,infra)"
        required: false
        type: string
        default: ""

env:
  CONTAINER_REGISTRY: europe-north1-docker.pkg.dev
  PROJECT_ID: festive-terrain-478011-h0
  CONTAINER_REPOSITORY: beveriq

jobs:
  build:
    # Same-repo builds run in-cluster against the shared rootless buildkitd:
    # AR pulls/pushes and the type=registry buildx cache ride Private Google
    # Access (free, in-region) instead of billing AR internet egress from
    # GitHub-hosted runners. Fork PRs are untrusted and must NOT run on
    # self-hosted runners — they build on GitHub-hosted in build-fork below.
    if: >-
      github.event.action != 'closed' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: self-hosted-k8s
    container:
      image: europe-north1-docker.pkg.dev/festive-terrain-478011-h0/beveriq/ci-runner:latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image_tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "push_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "push_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Plain TCP is accepted here: private single-tenant cluster, and the
      # legacy GKE dataplane doesn't enforce NetworkPolicy. Revisit (TLS via
      # --driver-opt cacert/cert/key, or DPv2 + NetworkPolicy) if the cluster
      # ever becomes multi-tenant.
      - name: Connect to in-cluster buildkitd
        run: docker buildx create --name k8s-buildkit --driver remote tcp://buildkitd.buildkit.svc.cluster.local:1234 --use

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: "projects/1040576468442/locations/global/workloadIdentityPools/iamwipp-pipelines/providers/iamwipp-github-pipelines-beveriq"
          service_account: "pipelines@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          token_format: "access_token"

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push images
        shell: bash
        env:
          TARGETS: ${{ inputs.docker_targets }}
          APP: ${{ inputs.app_name }}
        run: |
          TAG='${{ steps.vars.outputs.image_tag }}'
          PUSH_LATEST='${{ steps.vars.outputs.push_latest }}'
          REGISTRY="${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CONTAINER_REPOSITORY }}"
          CACHE_REF="${REGISTRY}/${APP}-cache:latest"

          FIRST=true
          for TARGET in $(echo "$TARGETS" | jq -r '.[]'); do
            IMAGE="${REGISTRY}/${APP}-${TARGET}"

            CACHE_TO_ARG=""
            if [ "$FIRST" = true ]; then
              CACHE_TO_ARG="--cache-to=type=registry,ref=${CACHE_REF},mode=max"
              FIRST=false
            fi

            TAGS="--tag ${IMAGE}:${TAG}"
            if [ "$PUSH_LATEST" = "true" ]; then
              TAGS="${TAGS} --tag ${IMAGE}:latest"
            fi

            docker buildx build \
              --file ./Dockerfile \
              --target "$TARGET" \
              --push \
              ${TAGS} \
              --cache-from="type=registry,ref=${CACHE_REF}" \
              $CACHE_TO_ARG \
              .
          done

  # Fork PRs: validate the build on GitHub-hosted runners — no cluster access,
  # no WIF auth, no push. Untrusted code must not reach self-hosted runners.
  build-fork:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (no push)
        shell: bash
        env:
          TARGETS: ${{ inputs.docker_targets }}
        run: |
          for TARGET in $(echo "$TARGETS" | jq -r '.[]'); do
            docker buildx build \
              --file ./Dockerfile \
              --target "$TARGET" \
              .
          done

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        flavor: ${{ fromJson(inputs.flavors) }}

    steps:
      - name: Setup ArgoCD CLI
        uses: imajeetyadav/argocd-cli@v1
        with:
          version: v3.2.1

      - name: Deploy ${{ matrix.flavor }} to ArgoCD
        env:
          ARGOCD_AUTH_TOKEN: ${{ vars.ARGO_API_KEY }}
          ARGOCD_URL: argo.anli.es
        env:
          APP: ${{ inputs.app_name }}
          FLAVOR: ${{ matrix.flavor }}
          WORKER_PREFIX: ${{ inputs.worker_image_prefix }}
        run: |
          REGISTRY="${{ env.CONTAINER_REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.CONTAINER_REPOSITORY }}"
          TAG="${{ needs.build.outputs.image_tag }}"

          # Map flavor to Docker target image
          case "$FLAVOR" in
            ${WORKER_PREFIX}-*) IMAGE_NAME="${APP}-${WORKER_PREFIX}" ;;
            *)
              # Use first non-worker target as the default image
              FIRST_TARGET=$(echo '${{ inputs.docker_targets }}' | jq -r '[.[] | select(. != "${{ inputs.worker_image_prefix }}")][0]')
              IMAGE_NAME="${APP}-${FIRST_TARGET}"
              ;;
          esac

          argocd app create --upsert ${APP}-${FLAVOR} --server $ARGOCD_URL \
            --project ${{ inputs.argocd_project }} \
            --repo git@github.com:CellarNode/crossplane-gcloud.git \
            --path ${{ inputs.deploy_path }}/${APP}-${FLAVOR}/ \
            --dest-server https://kubernetes.default.svc \
            --dest-namespace ${APP}-${FLAVOR} \
            --kustomize-image "app-image=${REGISTRY}/${IMAGE_NAME}:${TAG}" \
            --kustomize-common-label app.kubernetes.io/name=${APP}-${FLAVOR} \
            --nameprefix=${FLAVOR}- \
            --sync-policy auto \
            --sync-option CreateNamespace=true \
            --sync-option PruneLast=true

  # --- Discord thread lifecycle ---

  discord-thread-open:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_open
      tags: ${{ inputs.discord_tags }}

  discord-build-update:
    needs: [build, build-fork, discord-thread-open]
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      needs.build.result != 'cancelled' &&
      needs['build-fork'].result != 'cancelled'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_update
      # same-repo PRs run `build`; fork PRs run `build-fork` — report whichever ran
      status: ${{ needs.build.result != 'skipped' && needs.build.result || needs['build-fork'].result }}

  discord-thread-close:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: thread_close
      status: ${{ github.event.pull_request.merged && 'merged' || 'closed' }}

  discord-deploy:
    needs: deploy
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: CellarNode/.github/.github/workflows/discord-notify.yaml@main
    with:
      event: deploy
      status: ${{ needs.deploy.result }}
      tags: ${{ inputs.discord_tags }}
